name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Initialize Stellar theme submodules
      run: |
        git submodule update --init --recursive
        pnpm run themes:status

    - name: Validate Stellar theme configuration
      run: pnpm run stellar:validate

    - name: Run tests
      run: pnpm test

    - name: Lint check
      run: pnpm run lint

    - name: Build test with Stellar theme
      run: |
        pnpm run clean
        pnpm run stellar:validate
        pnpm run build

    - name: Check for broken links
      run: pnpm run check-links || echo "::warning::Link check reported issues (non-blocking)"

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Run security audit (fail on high/critical)
      run: |
        pnpm config set registry https://registry.npmjs.org
        pnpm exec audit-ci --high
