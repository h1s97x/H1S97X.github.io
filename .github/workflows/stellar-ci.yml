name: Stellar Theme CI/CD

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  validate:
    name: Validate Stellar Configuration
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Initialize submodules
      run: |
        git submodule update --init --recursive
        echo "📦 Theme submodules status:"
        pnpm run themes:status
        
    - name: Validate Stellar theme configuration
      run: |
        echo "🔍 Running Stellar theme validation..."
        pnpm run stellar:validate
        
    - name: Lint code
      run: pnpm run lint
      
    - name: Run unit tests
      run: pnpm test || echo "⚠️ Some tests failed"

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Initialize submodules
      run: git submodule update --init --recursive
      
    - name: Run Stellar test build
      run: |
        echo "🧪 Running Stellar theme test build..."
        pnpm run stellar:test
        
    - name: Verify build artifacts
      run: |
        echo "📊 Build verification:"
        if [ ! -d "public" ]; then
          echo "❌ Public directory not found"
          exit 1
        fi
        
        if [ ! -f "public/index.html" ]; then
          echo "❌ Index.html not generated"
          exit 1
        fi
        
        # 检查关键文件
        echo "✅ Checking key files:"
        [ -f "public/css/main.css" ] && echo "  ✓ CSS files generated"
        [ -f "public/js/main.js" ] && echo "  ✓ JS files generated"
        [ -f "public/search.json" ] && echo "  ✓ Search index generated"
        [ -f "public/sitemap.xml" ] && echo "  ✓ Sitemap generated"
        [ -f "public/atom.xml" ] && echo "  ✓ RSS feed generated"
        
        # 统计生成的文件
        html_count=$(find public -name "*.html" | wc -l)
        echo "📄 Generated $html_count HTML files"
        
        # 检查文件大小
        total_size=$(du -sh public | cut -f1)
        echo "📦 Total build size: $total_size"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stellar-build-${{ github.sha }}
        path: public/
        retention-days: 7

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: stellar-build-${{ github.sha }}
        path: public/
        
    - name: Deploy to preview environment
      run: |
        echo "🚀 Would deploy to preview environment"
        echo "📝 Preview URL would be available for PR review"
        # 这里可以集成 Netlify, Vercel 或其他预览服务
        
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: build-test
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: stellar-build-${{ github.sha }}
        path: public/
        
    - name: Install Lighthouse CI
      run: pnpm add -g @lhci/cli@0.12.x
      
    - name: Run Lighthouse CI
      run: |
        echo "🔍 Running performance tests..."
        # 启动简单的HTTP服务器
        pnpm dlx http-server public -p 8080 &
        sleep 5
        
        # 运行Lighthouse测试
        lhci autorun --upload.target=temporary-public-storage --collect.url=http://localhost:8080 || echo "⚠️ Performance test completed with warnings"
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security audit
      run: |
        echo "🔒 Running security audit..."
        pnpm audit --audit-level=moderate || echo "⚠️ Security audit completed with warnings"
        
    - name: Check for sensitive files
      run: |
        echo "🔍 Checking for sensitive files..."
        if find . -name "*.key" -o -name "*.pem" -o -name ".env" | grep -v node_modules | grep -q .; then
          echo "❌ Sensitive files found!"
          exit 1
        else
          echo "✅ No sensitive files detected"
        fi