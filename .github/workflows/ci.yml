name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Initialize Stellar theme submodules
      run: |
        git submodule update --init --recursive
        pnpm run themes:status

    - name: Validate Stellar theme configuration
      run: pnpm run stellar:validate

    - name: Run tests
      run: pnpm test

    - name: Lint check
      run: pnpm run lint

    - name: Build test with Stellar theme
      run: |
        pnpm run clean
        pnpm run stellar:validate
        pnpm run build

    - name: Check for broken links
      run: pnpm run check-links || echo "::warning::Link check reported issues (non-blocking)"

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    # Security gate: fail on high/critical. The 6 allowlisted advisories below are
    # build-time / dev-only transitive deps of a static blog — nothing in
    # node_modules ships to the browser, so there is no runtime attack surface and
    # they are not exploitable here. Each is documented so the gate still turns
    # red on any *new* genuinely dangerous high.
    #   GHSA-ph9p-34f9-6g65  tmp         all-contributors-cli>inquirer>external-editor   only triggers when YOU run all-contributors manually
    #   GHSA-88fw-hqm2-52qc  hono        textlint>@modelcontextprotocol/sdk              CORS bug needs MCP server exposed to untrusted web origins
    #   GHSA-hm92-r4w5-c3mj  undici      hexo-theme-stellar>cheerio                     needs SOCKS5 multi-origin proxy (not used in static build)
    #   GHSA-vmh5-mc38-953g  undici      hexo-theme-stellar>cheerio                     needs SOCKS5 + custom CA pinning (not used)
    #   GHSA-vxpw-j846-p89q  undici      hexo-theme-stellar>cheerio                     needs undici WebSocket client to attacker endpoint (not used)
    #   GHSA-22p9-wv53-3rq4  linkify-it  hexo-renderer-markdown-it>markdown-it          ReDoS needs untrusted markdown (we only render our own posts)
    - name: Run security audit (fail on high/critical, allowlist dev-only advisories)
      run: |
        pnpm config set registry https://registry.npmjs.org
        pnpm exec audit-ci --high \
          --allowlist "advisories:GHSA-ph9p-34f9-6g65,GHSA-88fw-hqm2-52qc,GHSA-hm92-r4w5-c3mj,GHSA-vmh5-mc38-953g,GHSA-vxpw-j846-p89q,GHSA-22p9-wv53-3rq4"
